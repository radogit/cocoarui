  <title>CoCoARUI - Dynamic UI Optimizer</title>

<body>
  <script type="module" src="script.js"></script>
  <div id="debug-panel" class="ui-panel">
    <div id="view-panel" class="ui-panel-box">
      <h2>View</h2>
      <div id="UIContainer">
      </div>
    </div>
    <div id="spawn-panel" class="ui-panel-box">
      <h2>Spawn</h2>
      <div id="spawnButtonContainer">
      <button id="spawnOneButton" keyboardShortcut="Tab">+1 Random</button>
      </div>
      
      <button id="removeAllButton" keyboardShortcut="KeyD" style="color: darkred">Delete All [D]</button>
      <button id="addOneSmartButton" keyboardShortcut="KeyS" style="color: darkgreen">+1 Smart [S]</button>

      <input type="radio" name="weightMethod" id="weightSignificance" value="signi" disabled>
      <label for="weightSignificance">Significance</label><br>
      <input type="radio" name="weightMethod" id="weightPriority" value="prio" disabled>
      <label for="weightPriority">Priority</label><br> -->

  </div>
  <div id="detail-panel" class="ui-panel ui-panel-box">
