<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
  <title>CoCoARUI - Dynamic UI Optimizer - 'Bubbles Configurator'</title>
  <style>
  </style>
</head>
<body>
  <script type="module" src="script.js"></script>
  <div id="debug-panel" class="ui-panel ui-panel-left ui-panel-top">
    <div id="view-panel" class="view-panel ui-panel-box">
      <h2 class="view-panel-header">
        <span>View <kbd>V</kbd></span>
        <button type="button" id="view-panel-caret" class="view-panel-caret" aria-label="Toggle view panel" title="Toggle view panel (V)"></button>
      </h2>
      <div id="UIContainer" class="UIContainer">
      </div>
    </div>
    <div id="simulation-panel" class="simulation-panel ui-panel-box">
      <h2>Simulation <kbd>S</kbd></h2>
      <div id="spawnButtonContainerDemoSamples" class="spawn-button-group">
        <div class="collapse-header">
          <span class="caret">&#9660;</span>
          <span>Demo Samples</span>
        </div>
      </div>
      <div id="spawnButtonContainerPPD" class="spawn-button-group">
        <div class="collapse-header">
          <span class="caret">&#9660;</span>
          <span>Paper Pano - descent</span>
        </div>
      </div>
      <div id="spawnButtonContainerPPA" class="spawn-button-group">
        <div class="collapse-header">
          <span class="caret">&#9660;</span>
          <span>Paper Pano - ascent</span>
        </div>
      </div>
      <div id="spawnButtonContainerVR1" class="spawn-button-group">
        <div class="collapse-header">
          <span class="caret">&#9660;</span>
          <span>VR - descent - standing</span>
        </div>
      </div>
      <div id="spawnButtonContainerVR2" class="spawn-button-group">
        <div class="collapse-header">
          <span class="caret">&#9660;</span>
          <span>VR - descent - cycling</span>
        </div>
      </div>
      <div id="spawnButtonContainerVR3" class="spawn-button-group">
        <div class="collapse-header">
          <span class="caret">&#9660;</span>
          <span>VR - ascent - standing</span>
        </div>
      </div>
      <div id="spawnButtonContainerVR4" class="spawn-button-group">
        <div class="collapse-header">
          <span class="caret">&#9660;</span>
          <span>VR - ascent - cycling</span>
        </div>
      </div>
      <div id="spawnButtonContainerKeepFreeSamples" class="spawn-button-group">
        <div class="collapse-header">
          <span class="caret">&#9660;</span>
          <span>Keep-Free Nodes</span>
        </div>
      </div>
      <div id="spawnButtonContainerDynamicGroups" class="spawn-button-group">
        <div class="collapse-header">
          <span class="caret">&#9660;</span>
          <span>Dynamic Groups</span>
        </div>
      </div>
      <div style="display: inline-block; min-width: 100%;">
        <button id="removeAllButton" keyboardShortcut="KeyD" style="color: darkred">Delete All [D]</button>
        <button id="addOneSmartButton" keyboardShortcut="KeyR" style="color: darkgreen">+1 Random [R]</button>
      </div>
    </div>
  </div>
  <!-- <div id="detail-panel" class="ui-panel ui-panel-right ui-panel-top ui-panel-box">
    <h2>Details</h2>
  </div> -->

  <!-- Right-hand column: Metrics, Settings, Export stacked, top-right aligned -->
  <div id="right-panel" class="ui-panel ui-panel-right ui-panel-top">
    <div id="settings-panel" class="settings-panel ui-panel-box hidden">
      <h2>Settings <kbd>T</kbd></h2>
      <!-- Previous idea: weighing panel (kept here for reference) -->
      <!-- <div id="weighing-panel" class="ui-panel-box">      
        <h2 class="todo">Weighing</h2>
        <label for="weightSize"><input type="radio" name="weightMethod" id="weightSize" value="size" checked disabled>Size</label>
        <label for="weightSignificance"><input type="radio" name="weightMethod" id="weightSignificance" value="signi" disabled>Significance</label>
        <label for="weightPriority"><input type="radio" name="weightMethod" id="weightPriority" value="prio" disabled>Priority</label>
      </div> -->

      <div class="settings-group">
        <h4>Background</h4>
        <label for="background-select">Preset</label>
        <select id="background-select">
          <!-- options filled from backgroundPresets in script.js -->
        </select>
      </div>
      <div class="settings-group">
        <h4>Simulation</h4>
        <label>
          <input type="checkbox" id="setting-collision" checked>
          Collision detection
        </label>
      </div>
      <div class="settings-group">
        <h4>Sequence Spawning</h4>
        <label>
          <input type="radio" name="sequenceMode" id="sequence-fixing" value="fixing" checked>
          fixing (lock node after it settles)
        </label><br>
        <label>
          <input type="radio" name="sequenceMode" id="sequence-floating" value="floating">
          floating (leave node free after it settles)
        </label>
      </div>
    </div>

    <div id="metrics-panel" class="metrics-panel ui-panel-box hidden">
      <h2>Metrics <kbd>M</kbd></h2>
    </div>

    <div id="export-panel" class="export-panel ui-panel-box hidden">
      <h2>Export <kbd>X</kbd></h2>
        <div style="display: inline-block; min-width: 100%;">
          <button id="downloadSVGButton">SVG</button>
          <button id="downloadPNGButton">PNG</button>
          <button id="downloadCSVButton">CSV</button>
        </div>
    </div>
  </div>
</body>
</html>
